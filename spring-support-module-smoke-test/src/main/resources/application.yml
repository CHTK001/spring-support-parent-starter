spring:
  application:
    name: spring-support-module-smoke-test
  main:
    lazy-initialization: true
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:h2:mem:smoke;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  kafka:
    bootstrap-servers: 127.0.0.1:9092
  rabbitmq:
    host: 127.0.0.1
    port: 5672
  elasticsearch:
    uris: http://127.0.0.1:9200
  sql:
    init:
      mode: ${smoke.sql.init.mode:never}
      schema-locations: ${smoke.sql.init.schema-locations:optional:classpath:db/schema.sql}
      data-locations: ${smoke.sql.init.data-locations:optional:classpath:db/data.sql}
server:
  port: 0
management:
  endpoints:
    web:
      exposure:
        include: health,info,beans,conditions
  health:
    defaults:
      enabled: false
logging:
  level:
    root: WARN
    com.chua: INFO
springdoc:
  api-docs:
    enabled: ${smoke.swagger.enable:false}
    groups:
      enabled: ${smoke.swagger.enable:false}
plugin:
  swagger:
    enable: ${smoke.swagger.enable:false}
  api:
    encode:
      enable: false
    decode:
      enable: false
    uniform: false
  proxy:
    enable: ${smoke.proxy.enable:false}
    auto-restart-running: ${smoke.proxy.auto-restart-running:false}
smoke:
  target:
    module: ${smoke.target.module:base}
